name: Build OmniPaper

on:
  push:
    branches: ["main", "ver/**"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MC_VERSION: "1.21.11"
      BUILD_NUMBER: ${{ github.run_number }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Configure Git
        run: |
          git config --global user.email "no-reply@github.com"
          git config --global user.name "GitHub Actions"

      - name: Apply patches
        run: ./gradlew applyAllPatches --stacktrace --no-daemon

      - name: Build Paperclip jar
        run: ./gradlew createMojmapPaperclipJar --stacktrace --no-daemon

      - name: Rename jar
        run: |
          mv omnipaper-server/build/libs/omnipaper-paperclip-${{ env.MC_VERSION }}-R0.1-SNAPSHOT-mojmap.jar \
             ./omnipaper-${{ env.MC_VERSION }}-${{ env.BUILD_NUMBER }}.jar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: omnipaper-${{ env.MC_VERSION }}-${{ env.BUILD_NUMBER }}
          path: ./omnipaper-${{ env.MC_VERSION }}-${{ env.BUILD_NUMBER }}.jar
          retention-days: 30

  release:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      MC_VERSION: "1.21.11"
      BUILD_NUMBER: ${{ github.run_number }}
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: omnipaper-${{ env.MC_VERSION }}-${{ env.BUILD_NUMBER }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "build-${{ env.BUILD_NUMBER }}"
          name: "OmniPaper ${{ env.MC_VERSION }} build ${{ env.BUILD_NUMBER }}"
          files: omnipaper-${{ env.MC_VERSION }}-${{ env.BUILD_NUMBER }}.jar
          generate_release_notes: true
